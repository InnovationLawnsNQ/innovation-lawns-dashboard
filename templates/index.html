<!DOCTYPE html>
<html>
<head>

<title>Innovation Lawns NQ Dashboard</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
padding:30px;
}

h1{
margin-bottom:30px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:25px;
}

input{
padding:10px;
margin:5px 0;
width:100%;
border-radius:5px;
border:none;
}

button{
background:#22c55e;
border:none;
padding:10px 15px;
border-radius:5px;
color:white;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #334155;
text-align:left;
}

</style>

</head>

<body>

<h1>Innovation Lawns NQ Dashboard</h1>

<div class="card">

<h3>Client List</h3>

<table>

<tr>
<th>Name</th>
<th>Phone</th>
<th>Address</th>
<th>Service</th>
<th>Frequency</th>
<th>Price</th>
<th>Actions</th>
</tr>

{% for client in clients %}

<tr>
<td>{{ client["name"] }}</td>
<td>{{ client["phone"] }}</td>
<td>{{ client["address"] }}</td>
<td>{{ client["service"] }}</td>
<td>{{ client["frequency"] }}</td>
<td>{{ client["price"] }}</td>

<td>
    <a href="/edit/{{ client['id'] }}">
        <button style="background:#3b82f6;">Edit</button>
    </a>

    <a href="/delete/{{ client['id'] }}">
        <button style="background:#ef4444;">Delete</button>
    </a>
</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
